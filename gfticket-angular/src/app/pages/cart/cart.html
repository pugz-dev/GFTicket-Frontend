@if (loading) {
<div class="page">
  <p class="status">Loading...</p>
</div>
} @else if (error) {
<div class="page state state--error">
  <p class="state__message">Event not found.</p>
  <a class="back-link" routerLink="/eventos">← Volver a eventos</a>
</div>
} @else if (event) {
<article class="page cart">
  <a class="back-link" routerLink="/eventos">← Volver a eventos</a>

  <div class="cart__item">
    <img class="cart__image" [src]="event.imagenUrl" [alt]="event.nombre" />

    <div class="cart__body">
      <h1 class="cart__title">{{ event.nombre }}</h1>
      <span class="cart__price">{{ event.precioMinimo }} € – {{ event.precioMaximo }} €</span>
    </div>
  </div>

  <form class="cart__form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <label class="cart__field">
      Email
      <input type="email" formControlName="email" />
    </label>

    <label class="cart__field">
      Nombre del titular
      <input type="text" formControlName="nombreTitular" />
    </label>

    <label class="cart__field">
      Número de tarjeta
      <input type="text" formControlName="numeroTarjeta" placeholder="4XXX-XXXX-XXXX-XXXX" />
    </label>

    <div class="cart__field-row">
      <label class="cart__field">
        Mes de caducidad
        <input type="text" formControlName="mesCaducidad" placeholder="MM" />
      </label>

      <label class="cart__field">
        Año de caducidad
        <input type="text" formControlName="yearCaducidad" placeholder="AAAA" />
      </label>

      <label class="cart__field">
        CVV
        <input type="text" formControlName="cvv" />
      </label>
    </div>

    <button type="submit" class="cart__checkout" [disabled]="form.invalid">Seleccionar e ir a pagar</button>
  </form>
</article>
}
