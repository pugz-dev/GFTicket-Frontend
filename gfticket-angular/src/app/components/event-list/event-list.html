<div class="topbar">
  @if (authService.usuarioActual(); as usuario) {
    <div class="topbar__user">
      <button class="topbar__user-btn" type="button" (click)="toggleMenu()">
        <span class="topbar__avatar">{{ usuario.nombre.charAt(0) }}</span>
        {{ usuario.nombre }}
        <span class="topbar__chevron">▾</span>
      </button>
      @if (menuOpen) {
        <div class="topbar__menu">
          <button class="topbar__menu-item" type="button" (click)="onLogout()">Cerrar sesión</button>
        </div>
      }
    </div>
  } @else {
    <a class="topbar__login" routerLink="/login">Iniciar sesión</a>
  }
</div>

@if (loading) {
  <div class="page">
    <div class="hero">
      <div class="skeleton skeleton-hero__label"></div>
      <div class="skeleton skeleton-hero__title"></div>
    </div>
    <div class="skeleton-grid">
      @for (i of [1, 2, 3, 4, 5, 6]; track i) {
        <div class="skeleton-card">
          <div class="skeleton skeleton-card__media"></div>
          <div class="skeleton-card__body">
            <div class="skeleton skeleton-card__title"></div>
            <div class="skeleton-card__footer">
              <div class="skeleton skeleton-card__venue"></div>
              <div class="skeleton skeleton-card__price"></div>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
} @else if (error) {
  <div class="page state state--error">
    <p class="state__message">Hubo un error al cargar los eventos.</p>
  </div>
} @else {
  <div class="page">
    <div class="hero">
      <span class="hero__label">En directo</span>
      <h1 class="hero__title">Próximos conciertos<br />y eventos en vivo</h1>
      <div class="event-list__search-wrapper">
        <input
          class="event-list__search-name"
          type="text"
          placeholder="Buscar por nombre..."
          [(ngModel)]="searchTerm" 
          (ngModelChange)="onSearchChange($event)"
        />
        <select class="event-list__search-locality" name="locality"
          [(ngModel)]="selectedLocality"
          (ngModelChange)="onLocalityChange($event)">
          <option value="" selected disabled hidden>Buscar por Localidad</option>
          @for(locality of localities; track locality){
            <option value="{{locality}}">{{locality}}</option>
          }
        </select>
        <button (click) ="clearFilters()">Clear Filters</button>
      </div>
    </div>
    <app-event-catalog [events]="filteredEvents" />
  </div>
}
