@for (event of events; track event.id) {
<a class="event-card" [routerLink]="['/eventos', event.id]">
    <div class="event-card__media">
        <div class="event-card__placeholder">FOTO · {{ event.nombre }}</div>
        @if (event.imagenUrl) {
            <img class="event-card__image" [src]="event.imagenUrl" [alt]="event.nombre" (error)="$event.target.style.display='none'" />
        }
        <div class="event-card__scrim"></div>
        <div class="event-card__date">
            <div class="event-card__date-num">{{ dayNum(event) }}</div>
            <div class="event-card__date-month">{{ monthAbbr(event) }}</div>
        </div>
        <span class="event-card__genre">{{ event.genero }}</span>
    </div>

    <div class="event-card__body">
        <h2 class="event-card__title">{{ event.nombre }}</h2>

        <div class="event-card__footer">
            <span class="event-card__venue">{{ event.nombreRecinto }} · {{ event.localidad }}</span>
            <span class="event-card__price">Desde {{ event.precioMinimo }} €</span>
        </div>
    </div>
</a>
}
